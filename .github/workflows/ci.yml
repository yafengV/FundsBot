name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  docs-and-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Spectral
        run: npm i -g @stoplight/spectral-cli

      - name: Lint OpenAPI
        run: spectral lint api/openapi/fundsbot.v1.yaml

      - name: Check required files
        run: |
          test -f db/schema.sql
          test -f db/seed.sql
          test -f PRD.md
