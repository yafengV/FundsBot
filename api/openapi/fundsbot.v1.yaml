openapi: 3.0.3
info:
  title: FundsBot API
  version: 1.0.0
  description: API contract for FundsBot MVP
servers:
  - url: /api/v1
security:
  - bearerAuth: []
tags:
  - name: Ledgers
  - name: Positions
  - name: Imports
  - name: Dashboard
  - name: Notify
  - name: Reports
paths:
  /ledgers:
    get:
      tags: [Ledgers]
      summary: List ledgers with summary
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LedgerSummary'
    post:
      tags: [Ledgers]
      summary: Create ledger
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLedgerReq'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ledger'
        '400':
          $ref: '#/components/responses/ApiError'

  /positions:
    get:
      tags: [Positions]
      summary: Query positions
      parameters:
        - in: query
          name: ledgerId
          schema: { type: string, format: uuid }
        - in: query
          name: platform
          schema: { type: string, enum: [alipay, tencent, tiantian, xueqiu, other] }
        - in: query
          name: sortBy
          schema: { type: string, enum: [todayPnl, totalPnl, changeRate] }
        - in: query
          name: order
          schema: { type: string, enum: [asc, desc], default: desc }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Position'
    post:
      tags: [Positions]
      summary: Create position
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreatePositionReq' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Position' }
        '400':
          $ref: '#/components/responses/ApiError'

  /positions/{id}:
    patch:
      tags: [Positions]
      summary: Update position by operation
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdatePositionReq' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Position' }
        '400':
          $ref: '#/components/responses/ApiError'
    delete:
      tags: [Positions]
      summary: Soft delete a position
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
        - in: header
          name: X-Confirm-Token
          required: true
          schema: { type: string }
      responses:
        '204':
          description: No Content
        '400':
          $ref: '#/components/responses/ApiError'

  /dashboard/overview:
    get:
      tags: [Dashboard]
      summary: Get overview metrics
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DashboardOverview' }

  /notify/rules:
    put:
      tags: [Notify]
      summary: Upsert notify rules
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/NotifyRuleReq' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NotifyRuleReq' }

  /reports/weekly:
    get:
      tags: [Reports]
      summary: Get weekly snapshot
      parameters:
        - in: query
          name: week
          required: true
          schema: { type: string, example: '2026-W10' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReportSnapshot' }

  /reports/monthly:
    get:
      tags: [Reports]
      summary: Get monthly snapshot
      parameters:
        - in: query
          name: month
          required: true
          schema: { type: string, example: '2026-03' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReportSnapshot' }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    ApiError:
      description: Standard error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    Ledger:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        currency: { type: string, example: CNY }
        createdAt: { type: string, format: date-time }
      required: [id, name, currency, createdAt]

    LedgerSummary:
      allOf:
        - $ref: '#/components/schemas/Ledger'
        - type: object
          properties:
            totalAssetCents: { type: integer, format: int64 }
            todayPnlCents: { type: integer, format: int64 }
            totalPnlCents: { type: integer, format: int64 }
            positionCount: { type: integer }

    CreateLedgerReq:
      type: object
      properties:
        name: { type: string, minLength: 2, maxLength: 20 }
        currency: { type: string, default: CNY }
      required: [name]

    Position:
      type: object
      properties:
        id: { type: string, format: uuid }
        ledgerId: { type: string, format: uuid }
        fundCode: { type: string }
        platform: { type: string }
        shares: { type: string, example: '1234.5600' }
        avgCostNav: { type: string, example: '1.234500' }
        marketValueCents: { type: integer, format: int64 }
        totalPnlCents: { type: integer, format: int64 }
        status: { type: string, enum: [holding, cleared, deleted] }
      required: [id, ledgerId, fundCode, shares, avgCostNav, status]

    CreatePositionReq:
      type: object
      properties:
        ledgerId: { type: string, format: uuid }
        fundCode: { type: string }
        shares: { type: string }
        costNav: { type: string }
        platform: { type: string, enum: [alipay, tencent, tiantian, xueqiu, other] }
        buyDate: { type: string, format: date }
      required: [ledgerId, fundCode, shares, costNav]

    UpdatePositionReq:
      type: object
      properties:
        op: { type: string, enum: [increase, decrease, edit] }
        shares: { type: string }
        tradeNav: { type: string }
        tradeDate: { type: string, format: date }
      required: [op]

    DashboardOverview:
      type: object
      properties:
        totalAssetCents: { type: integer, format: int64 }
        todayEstPnlCents: { type: integer, format: int64 }
        totalPnlCents: { type: integer, format: int64 }
        totalPnlRateBp: { type: integer }
        lastQuoteAt: { type: string, format: date-time }
      required: [totalAssetCents, todayEstPnlCents, totalPnlCents]

    NotifyRuleReq:
      type: object
      properties:
        enableNavDone: { type: boolean }
        profitThresholdCents: { type: integer, format: int64, nullable: true }
        lossThresholdCents: { type: integer, format: int64, nullable: true }
        dndStart: { type: string, example: '23:00' }
        dndEnd: { type: string, example: '08:00' }

    ReportSnapshot:
      type: object
      properties:
        reportType: { type: string, enum: [weekly, monthly] }
        periodKey: { type: string }
        version: { type: integer }
        generatedAt: { type: string, format: date-time }
        payload: { type: object, additionalProperties: true }
      required: [reportType, periodKey, version, generatedAt, payload]

    ErrorResponse:
      type: object
      properties:
        requestId: { type: string }
        error:
          type: object
          properties:
            code: { type: string, example: FND-1002 }
            message: { type: string }
            field: { type: string, nullable: true }
          required: [code, message]
      required: [requestId, error]
